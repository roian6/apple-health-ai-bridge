name: Bug report
description: Report a reproducible problem using synthetic or redacted data
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Never include real HealthKit values, exports, receiver databases, tokens, pairing material, setup pages, cursor values, outbox payloads, or private receiver endpoints.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the visible problem without private data.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reproduction using synthetic fixtures or redacted aggregate output.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Project version
      description: Paste `uv run health-bridge --version` output or the relevant Git commit.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Python CLI or package
        - Receiver or pairing
        - MCP queries
        - iOS app or HealthKit
        - Documentation or setup
        - Release or CI
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python/uv version, and iOS/Xcode/TestFlight details when relevant.
      placeholder: |
        OS:
        Python:
        uv:
        iOS/Xcode/TestFlight:
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety confirmation
      options:
        - label: I did not include real HealthKit values, exports, or screenshots containing health data.
          required: true
        - label: I did not include tokens, token hashes, pairing links, setup-page contents, receiver databases, cursor values, or outbox payloads.
          required: true
        - label: I replaced private receiver hosts, IP addresses, account details, and local paths with neutral placeholders.
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Optional synthetic, redacted, or aggregate-safe details only.
