name: Setup feedback
description: Report friction in quickstart, MCP, receiver, pairing, TestFlight, or self-build flows
title: "[Setup]: "
labels: ["question"]
body:
  - type: dropdown
    id: flow
    attributes:
      label: Setup flow
      options:
        - README synthetic quickstart
        - MCP client setup
        - Local or private receiver setup
        - iOS self-build
        - TestFlight installation
        - Pairing or setup page
        - Apple Health permission
        - Foreground sync
        - Recovery or troubleshooting
        - Documentation or positioning
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include only non-sensitive version information.
      placeholder: |
        OS:
        Python:
        uv:
        health-bridge version:
        MCP client:
        iPhone/iOS/Xcode/TestFlight:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: What you tried
      description: Use placeholders for private hosts, IP addresses, account names, and local paths.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: visible-error
    attributes:
      label: Visible error
      description: Paste only redacted visible error text. Do not include payloads, tokens, setup links, receiver databases, or real health values.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety confirmation
      options:
        - label: I did not include real HealthKit values, exports, or screenshots containing health data.
          required: true
        - label: I did not include tokens, token hashes, pairing links, setup-page contents, receiver databases, cursor values, or outbox payloads.
          required: true
        - label: I replaced private receiver hosts, IP addresses, account details, and local paths with neutral placeholders.
          required: true
